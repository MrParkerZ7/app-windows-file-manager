name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      # Gate 1: Format check
      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

      # Gate 2: Build with warnings as errors
      - name: Build
        run: dotnet build -c Release --no-restore /p:TreatWarningsAsErrors=true

      # Gate 3: Test with coverage enforcement (100% line, branch, method)
      - name: Test with coverage
        run: >
          dotnet test -c Release --no-build
          --collect:"XPlat Code Coverage"
          --settings tests/WindowsFileManager.Tests/coverlet.runsettings

      # Gate 4: Dependency vulnerability audit
      - name: Dependency audit
        run: |
          $output = dotnet list package --vulnerable --include-transitive 2>&1
          Write-Output $output
          if ($output -match "has the following vulnerable packages") {
            Write-Error "Vulnerable packages detected!"
            exit 1
          }
        shell: pwsh

      # Gate 5: Upload coverage report
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: tests/**/TestResults/**/coverage.cobertura.xml
